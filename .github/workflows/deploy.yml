name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy via SSH
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            set -e

            echo ">>> Fix git safe directory"
            git config --global --add safe.directory /var/www/laravel

            cd /var/www/laravel

            echo ">>> Fix ownership before pull"
            sudo chown -R $USER:$USER /var/www/laravel

            echo ">>> Pull latest code"
            git pull origin main

            echo ">>> Restore www-data ownership"
            sudo chown -R www-data:www-data /var/www/laravel
            sudo chmod -R 775 /var/www/laravel/storage /var/www/laravel/bootstrap/cache

            echo ">>> Install dependencies"
            sudo -u www-data composer install --optimize-autoloader --no-dev --no-interaction

            echo ">>> Clear & cache config"
            sudo -u www-data php artisan config:clear
            sudo -u www-data php artisan route:clear
            sudo -u www-data php artisan view:clear
            sudo -u www-data php artisan config:cache
            sudo -u www-data php artisan route:cache
            sudo -u www-data php artisan view:cache

            echo ">>> Run migrations"
            sudo -u www-data php artisan migrate --force

            echo ">>> Restart PHP-FPM"
            sudo systemctl restart php8.2-fpm

            echo ">>> Deployment complete!"
          EOF
